<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Home Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>

<body>

    <!-- HEADER / SEARCH -->
    <header class="dashboard-header">
        <div class="search-container">
            <input id="searchBox" class="search-input" type="text" placeholder="Search files and folders..."
                autocomplete="off">
            <i class="filter-icon fas fa-filter"></i>
            <div id="suggestions"></div>
        </div>
    </header>

    <!-- BODY: SIDEBAR + MAIN -->
    <div class="dashboard-body">

        <!-- SIDEBAR -->
        <aside class="sidebar">





            <!-- Upload -->
            <div class="upload-container">
                <form action="{{ url_for('upload') }}?folder_id={{current_folder}}" method="post" enctype="multipart/form-data">
                    <input type="file" id="uploaded_file" name="uploaded_file">
                    <button type="submit">Upload</button>
                </form>
            </div>











            <h2>Folders</h2>

            <!-- Always go back to root -->
            <a href="{{ url_for('home_page') }}" class="home-page-button">
                🏠 Home
            </a>

            <!-- If you’re in a subfolder, show an “Up” link -->
        
            <!-- Folder list -->
            <ul class="folders-list">
                {% for folder in folders %}
                <li>
                    <!-- In-app navigation: pass folder.id to your route -->
                    <a href="{{ url_for('home_page', folder_id=folder.id) }}" class="folder-link">
                        📁 {{ folder.name }}
                    </a>
                    
                </li>
                {% endfor %}
            </ul>

        </aside>


        <!-- MAIN CONTENT -->
        <main class="main-content">
            <ul class="files-grid">
                {% for file in files %}
                <li class="file-card">
                    <h3>{{ file.name }}</h3>
                    <div class="meta">
                      Size: {{ (file.size | default(0) | int / (1024*1024)) | round(3) }} MB
                    </div>
                    <div class="actions">
                        <a class="view" href="{{ file.webViewLink }}" target="_blank">View</a>
                        <a class="download" href="{{ url_for('download_file', file_id=file.id) }}">Download</a>
                        <a class="delete" href="{{ url_for('delete_file',   file_id=file.id) }}?folder_id={{current_folder}} ">Delete</a>
                    </div>
                </li>
                {% endfor %}
            </ul>
        </main>

    </div>

    <script src="{{ url_for('static', filename='live_search.js') }}"></script>
</body>

</html>
