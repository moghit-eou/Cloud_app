<!DOCTYPE html>
<html>

<head>
    <title>Files</title>
</head>

<body>
    <h2>Your Google Drive Files</h2>
    <ul>
        {% for file in files %}

        <li>
            <h3>{{ file.name }}</h3>

            <a href="{{ file.webViewLink }}" target="_blank">View file</a>
            <a href="{{ url_for('download_file', file_id=file.id) }}">Download</a>
            <a href="{{ url_for('delete_file',   file_id=file.id) }}">Delete</a>

        </li>

        {% endfor %}
    </ul>

    <h1>Upload to Google Drive</h1>
    <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
        <label for="uploaded_file">Choose file:</label>
        <input type="file" id="uploaded_file" name="uploaded_file">
        <button type="submit">Upload</button>
    </form>


</body>

</html>
