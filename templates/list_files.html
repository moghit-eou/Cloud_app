<!DOCTYPE html>
<html>
<head>
    <title>Files</title>
</head>
<body>
    <h2>Your Google Drive Files</h2>
    <ul>
        {% for file in files %}

            <li>
                <h3>{{ file.name }}</h3>
                <a href="{{ file.webViewLink }}" target="_blank">Click to the Link</a>
            </li>

        {% endfor %}
    </ul>
</body>
</html>
